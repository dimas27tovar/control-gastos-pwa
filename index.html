<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#181C22" />
<title>Control de gastos</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #181C22;
    color: #E8EAED;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    padding: 24px 16px 80px;
    padding-top: max(24px, env(safe-area-inset-top));
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  .eyebrow {
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: #6B7684; margin-bottom: 6px; font-family: 'JetBrains Mono', monospace;
  }
  .panel {
    background: #20262E; border: 1px solid #2A313B; border-radius: 14px;
    padding: 20px 20px 16px; position: relative; overflow: hidden; margin-bottom: 20px;
  }
  .panel::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: repeating-linear-gradient(90deg, #4FD1C5 0 8px, transparent 8px 16px);
    opacity: 0.5;
  }
  .total-row { display: flex; align-items: baseline; gap: 8px; color: #8B95A1; font-size: 13px; }
  .total-value {
    font-family: 'JetBrains Mono', monospace; font-size: 40px; font-weight: 700;
    margin-top: 4px; letter-spacing: -0.02em; color: #F5F7FA;
  }
  .total-sub { font-size: 12px; color: #5C6673; margin-top: 4px; }
  .section-title {
    display: flex; align-items: center; gap: 6px; font-size: 11px;
    letter-spacing: 0.1em; text-transform: uppercase; color: #6B7684;
    margin-bottom: 8px; font-family: 'JetBrains Mono', monospace;
  }
  .row {
    background: #20262E; border: 1px solid #2A313B; border-radius: 12px;
    padding: 12px 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #4FD1C5; flex-shrink: 0; }
  .dot.debito { background: #F0A857; }
  .dot.transferencia { background: #8B9CF5; }
  .row-main { flex: 1; min-width: 0; }
  .row-desc { font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row-meta { font-size: 11px; color: #5C6673; }
  .row-amount { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #F5F7FA; white-space: nowrap; }
  .empty {
    background: #20262E; border: 1px dashed #2A313B; border-radius: 14px;
    padding: 28px 16px; text-align: center; color: #5C6673; font-size: 13px;
  }
  .refresh-btn {
    background: none; border: 1px solid #2A313B; color: #8B95A1; border-radius: 8px;
    padding: 8px 12px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px;
  }
  .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .spinner {
    width: 14px; height: 14px; border: 2px solid #3A424D; border-top-color: #4FD1C5;
    border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box {
    background: #2A1F20; border: 1px solid #4A2E2E; color: #F0A0A0;
    border-radius: 10px; padding: 12px 14px; font-size: 13px; margin-bottom: 16px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header-row">
      <div class="eyebrow">Panel de gastos</div>
      <button class="refresh-btn" onclick="cargarGastos()">
        <span id="refresh-icon">↻</span> Actualizar
      </button>
    </div>

    <div class="panel">
      <div class="total-row">💳 Total acumulado</div>
      <div class="total-value" id="total">$0</div>
      <div class="total-sub" id="total-sub">Cargando...</div>
    </div>

    <div id="error-container"></div>

    <div class="section-title">Historial</div>
    <div id="lista"><div class="empty">Cargando tus gastos...</div></div>
  </div>

<script>
  // Pega aquí la URL de tu Web App de Google Apps Script (termina en /exec)
  const API_URL = "https://script.google.com/macros/s/AKfycbw9D7uapmuMAdFwHQLZdNfyRGXkQswQU9AR6O9QDNnKT380GUZ3mTieZec0C0magxKq/exec";

  function fmt(n, moneda) {
    try {
      return new Intl.NumberFormat("es-UY", { style: "currency", currency: moneda || "UYU" }).format(n);
    } catch (e) {
      return (moneda || "") + " " + n;
    }
  }

  function dotClass(tipo) {
    if (!tipo) return "";
    const t = tipo.toLowerCase();
    if (t.includes("transferencia")) return "transferencia";
    if (t.includes("d\u00e9bito") || t.includes("debito")) return "debito";
    return "";
  }

  async function cargarGastos() {
    const icon = document.getElementById("refresh-icon");
    icon.innerHTML = '<span class="spinner"></span>';
    const errorContainer = document.getElementById("error-container");
    errorContainer.innerHTML = "";

    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error("Respuesta no válida del servidor");
      const gastos = await res.json();
      renderizar(gastos);
      localStorage_set("gastos-cache", JSON.stringify(gastos));
    } catch (err) {
      errorContainer.innerHTML =
        '<div class="error-box">No se pudo conectar con tu Google Sheet. Verifica tu conexión a internet. (' +
        err.message + ")</div>";
      // intenta usar la última copia guardada
      const cache = localStorage_get("gastos-cache");
      if (cache) renderizar(JSON.parse(cache));
      else document.getElementById("lista").innerHTML = '<div class="empty">No hay datos disponibles.</div>';
    } finally {
      icon.textContent = "↻";
    }
  }

  function renderizar(gastos) {
    const lista = document.getElementById("lista");
    const totalEl = document.getElementById("total");
    const totalSub = document.getElementById("total-sub");

    if (!gastos || gastos.length === 0) {
      lista.innerHTML = '<div class="empty">Aún no hay gastos registrados.</div>';
      totalEl.textContent = fmt(0, "UYU");
      totalSub.textContent = "0 movimientos";
      return;
    }

    const total = gastos.reduce((sum, g) => sum + (parseFloat(g.monto) || 0), 0);
    const moneda = gastos[0].moneda || "UYU";
    totalEl.textContent = fmt(total, moneda);
    totalSub.textContent = gastos.length + (gastos.length === 1 ? " movimiento" : " movimientos");

    lista.innerHTML = gastos
      .map(
        (g) => `
      <div class="row">
        <div class="dot ${dotClass(g.tipo)}"></div>
        <div class="row-main">
          <div class="row-desc">${escapeHtml(g.establecimiento || "Sin identificar")}</div>
          <div class="row-meta">${escapeHtml(g.tipo || "")} · ${escapeHtml(g.fecha || "")}</div>
        </div>
        <div class="row-amount">${fmt(g.monto, g.moneda)}</div>
      </div>
    `
      )
      .join("");
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function localStorage_set(k, v) {
    try { localStorage.setItem(k, v); } catch (e) {}
  }
  function localStorage_get(k) {
    try { return localStorage.getItem(k); } catch (e) { return null; }
  }

  // Carga inicial
  cargarGastos();

  // Registrar service worker para funcionar offline / ser instalable
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
